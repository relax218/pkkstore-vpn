name: Build PKKStore VPN APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0) - leave empty to only build'
        required: false
        type: string
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '14742923'
        packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;29.0.14206865"
        echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: bash compile-hevtun.sh

    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Fetch AndroidLibXrayLite tag
      run: |
        pushd AndroidLibXrayLite
        CURRENT_TAG=$(git describe --tags --abbrev=0)
        echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
        popd

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.13
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.CURRENT_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: V2rayNG/app/libs/

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Generate Keystore (auto if no secret)
      run: |
        if [ -z "${{ secrets.APP_KEYSTORE_BASE64 }}" ]; then
          keytool -genkey -v \
            -keystore /tmp/pkkstore.jks \
            -alias pkkstore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pkkstore123 -keypass pkkstore123 \
            -dname "CN=PKKStore VPN,O=PKKStore,C=MM"
          echo "KEYSTORE_PATH=/tmp/pkkstore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=pkkstore123" >> $GITHUB_ENV
          echo "KEY_ALIAS=pkkstore" >> $GITHUB_ENV
          echo "KEY_PASS=pkkstore123" >> $GITHUB_ENV
        fi


    - name: Build PKKStore VPN APK
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_PATH }} \
          -Pandroid.injected.signing.store.password=${{ env.KEYSTORE_PASS }} \
          -Pandroid.injected.signing.key.alias=${{ env.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ env.KEY_PASS }}

    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: PKKStore-VPN-arm64-v8a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*arm64-v8a*.apk

    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: PKKStore-VPN-armeabi-v7a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*armeabi-v7a*.apk

    - name: Upload universal APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: PKKStore-VPN-universal
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*universal*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-apks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "PKKStore VPN ${{ inputs.release_tag }}"
          body: |
            ## PKKStore VPN ${{ inputs.release_tag }}

            ### Download
            - **arm64-v8a** — ခေတ်မီ Android ဖုန်းများအတွက် (recommended)
            - **armeabi-v7a** — ဟောင်းသော Android ဖုန်းများအတွက်
            - **universal** — ဖုန်းအားလုံးအတွက် (ဖိုင်ကြီး)

            ### Install လုပ်ပုံ
            1. APK ဖိုင် download လုပ်ပါ
            2. Android Settings → "Install unknown apps" ဖွင့်ပါ
            3. APK ဖိုင်ကို ဖွင့်ပြီး install လုပ်ပါ
            4. PKKStore VPN ဖွင့်ပြီး subscription link ထည့်ပါ

            Built with ❤️ by PKKStore
          files: release-apks/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
